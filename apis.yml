aid: trade-desk
name: The Trade Desk
description: >-
  The Trade Desk is an independent, omnichannel demand-side platform (DSP) for
  programmatic advertising, headquartered in Ventura, California. Its
  cloud-based platform — Kokai (the current flagship, succeeding Solimar) —
  lets agencies, brands, and trading desks buy and optimize digital ad
  inventory across connected TV (CTV), audio, mobile, video, native, display,
  and digital out-of-home. The Trade Desk positions itself as the
  buy-side counterweight to the walled gardens by championing the open
  internet through OpenPath (direct publisher integrations that bypass SSPs)
  and Unified ID 2.0 (UID2), an open-source, deterministic identity framework
  governed by the IAB Tech Lab. The company also stewards EUID (UID2's
  European equivalent), the Galileo first-party data activation framework,
  and Koa — its in-platform AI used for forecasting, bidding optimization,
  and audience modeling. Programmatic developers integrate via the TTD
  Workflows API (REST + GraphQL for campaign, ad group, and creative
  management), the Data API (advertiser/third-party data ingestion, offline
  conversions, deletion/opt-out), the Real-Time Conversion Events API (RTCE),
  and the OpenSincera data-quality APIs (acquired May 2024). Official SDKs
  are published in Python, Go, and Java and are Speakeasy-generated from
  OpenAPI specs. Most documentation lives behind the Partner Portal
  (partner.thetradedesk.com) but a public docs surface is exposed at
  open.thetradedesk.com. The Trade Desk is publicly traded (NASDAQ: TTD).
