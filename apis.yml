  - url: https://partner.thetradedesk.com/v3/portal/api/doc/ApiUsageGuidelines
    type: Documentation
  - url: https://github.com/TheTradeDesk/Platform
    type: CodeExamples
    name: TheTradeDesk/Platform helper scripts
  description: >-
    The original REST Platform API covering advertisers, campaigns, ad
    groups, creatives, targeting data, reporting, and audience operations.
    Documentation is gated behind the TTD Partner Portal. New integrations
    are generally steered to the Workflows API; Platform remains the
    reference for low-level objects and reporting endpoints.
- aid: trade-desk:trade-desk-realtime-conversion-events-api
  name: The Trade Desk Real-Time Conversion Events API
  tags:
  - Advertising
  - Conversions
  - Measurement
  - Server-Side
  humanURL: https://partner.thetradedesk.com/v3/portal/api/doc/ApiOverview
  properties:
  - url: https://github.com/TheTradeDesk/conversion-events-sdk-for-googletagmanager
    type: SDK
    name: GTM Client-Side Template
  - url: https://github.com/TheTradeDesk/conversion-events-server-side-googletagmanager
    type: SDK
    name: GTM Server-Side Template
  description: >-
    Server-side and client-side conversion event ingestion (Apache 2.0
    Google Tag Manager templates) for capturing high-fidelity attribution
    signals in a cookie-deprecated environment. Pairs with UID2 for
    identity resolution.
- aid: trade-desk:trade-desk-uid2-api
  name: Unified ID 2.0 (UID2)
  tags:
  - Identity
  - Privacy
  - Open Source
  - IAB Tech Lab
  humanURL: https://unifiedid.com
  properties:
  - url: https://unifiedid.com
    type: Portal
  - url: https://unifiedid.com/docs/intro
    type: Documentation
  - url: https://github.com/IABTechLab/uid2docs
    type: Documentation
    name: UID2 Documentation Repository
  - url: https://github.com/IABTechLab/uid2-operator
    type: SDK
    name: UID2 Operator Reference Implementation
  description: >-
    Unified ID 2.0 is an open-source, deterministic identity framework
    seeded by The Trade Desk and now governed by the IAB Tech Lab. UID2
    resolves hashed email addresses and phone numbers into rotating
    tokens that publishers, DSPs, SSPs, and measurement vendors can use
    for addressable advertising without third-party cookies. The EUID
    variant provides a GDPR-aligned European deployment.
- aid: trade-desk:trade-desk-opensincera-api
  name: OpenSincera API
  tags:
  - Advertising
  - Data Quality
  - Supply Path
  - Transparency
  humanURL: https://partner.thetradedesk.com/v3/portal/opensincera/overview
  properties:
  - url: https://partner.thetradedesk.com/v3/portal/opensincera/overview
    type: Documentation
  description: >-
    OpenSincera (from the May 2024 Sincera acquisition) provides
    programmatic supply-side transparency data — ad slot quality, page
    attributes, viewability metadata, supply-path metrics — to help
    buyers value impressions and audit inventory.
