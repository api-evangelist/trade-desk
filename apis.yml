  - Conversions
  - Privacy
  humanURL: https://open.thetradedesk.com/advertiser/docsApp/GuidesAdvertiser/data
  properties:
  - url: https://open.thetradedesk.com/advertiser/docsApp/GuidesAdvertiser/data/doc/post-data-advertiser-firstparty
    type: Documentation
  - url: https://open.thetradedesk.com/provider/docsApp/GuidesProvider/audience/doc/post-data-thirdparty
    type: Documentation
  - url: https://open.thetradedesk.com/advertiser/docsApp/GuidesAdvertiser/data/doc/post-providerapi-offlineconversion
    type: Documentation
  - url: openapi/trade-desk-data-api-openapi.yml
    type: OpenAPI
  - url: https://github.com/TheTradeDesk/ttd-data-python
    type: SDK
    name: Python SDK
  description: >-
    Ingest first-party advertiser audience data, third-party provider
    audience data, and offline conversions (CAPI-style), and submit
    data-subject deletion / opt-out requests across advertiser, merchant,
    and provider contexts. The Data API powers audience targeting and
    offline-to-online measurement and supports UID2 identity mapping.
