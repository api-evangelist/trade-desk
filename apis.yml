    The Workflows API exposes the high-level campaign, ad group, creative,
    and bulk-job operations that previously required navigating the legacy
    Platform API. It blends REST and GraphQL surfaces (including a generic
    GraphQL passthrough and bulk query jobs) and is the recommended modern
    integration path for new partners.
